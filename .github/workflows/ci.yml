# Standard Tier 3 CI — minimal dependency-review floor.
#
# Tier 3 repos (claude plugins, omnifocus plugins, content repos) do not
# standardize a build/test step here; work-type-specific CI (lint markdown,
# validate plugin manifests, tsc) lives in additional workflows owned by the
# template's scaffold layer. The standard guarantees the dependency-review
# floor only — every PR that touches deps gets vetted against the CVE feed.
#
# The dependency-review job is VENDORED INLINE here rather than calling
# devops-excellence's reusable-dependency-review.yml. A PUBLIC repo cannot
# resolve a reusable workflow hosted in the PRIVATE devops-excellence repo —
# GitHub reports "workflow was not found" at workflow-load time, which fails
# the whole run (startup failure). This repo is public (it is published as a
# Claude Code plugin marketplace), so it inlines the job. See the tracking
# issue in devops-excellence for the systemic fix to the Tier-3 standard.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Check out repo
        uses: actions/checkout@v7

      - name: Dependency Review
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: on-failure
