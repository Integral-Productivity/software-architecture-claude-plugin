# Standard Tier 3 CI — minimal dependency-review floor.
#
# Tier 3 repos (claude plugins, omnifocus plugins, content repos) do not
# standardize a build/test step here; work-type-specific CI (lint markdown,
# validate plugin manifests, tsc) lives in additional workflows owned by the
# template's scaffold layer. The standard guarantees the dependency-review
# floor only — every PR that touches deps gets vetted against the CVE feed.
#
# The dependency-review reusable is consumed from the PUBLIC
# Integral-Productivity/reusable-workflows repo, NOT from the private
# devops-excellence repo. This repo is public (published as a Claude Code
# plugin marketplace), and GitHub blocks a public repo from calling a
# reusable workflow stored in a private/internal repo — the run fails at
# startup ("workflow file issue", zero jobs) on every event. The public host
# is the canonical fix per devops-excellence ADR-038 and its
# public-private-reusable fitness check. See devops-excellence#297 for
# repointing the Tier-3 template so future public adopters don't break.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    uses: Integral-Productivity/reusable-workflows/.github/workflows/reusable-dependency-review.yml@v1
